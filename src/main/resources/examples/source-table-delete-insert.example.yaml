# Example: source_mode=table, write_mode=delete_insert
# Start with:
#   java -Dconfig=src/main/resources/examples/source-table-delete-insert.example.yaml -jar etl.jar
#
# Notes:
# - delete_insert requires target_key_columns, not just target_key_column.
# - Every target_key_columns item must exist in column_mappings.target_column.
# - Table mode supports filters.

source:
  host: "127.0.0.1"
  port: 3306
  username: "root"
  password: "your_password"
  database: "source_db"
  charset: "utf8mb4"

target:
  host: "127.0.0.1"
  port: 3306
  username: "root"
  password: "your_password"
  database: "target_db"
  charset: "utf8mb4"

options:
  batch_size: 1000
  continue_on_error: false
  checkpoint_table: "edu_db_sync_checkpoint"
  auto_create_checkpoint_table: true

tables:
  - name: "student_course_delete_insert_demo"
    source_mode: "table"
    write_mode: "delete_insert"
    source_table: "source_student_course"
    target_table: "target_student_course"
    cursor_id_column: "id"
    sync_time_column: "update_time"
    fallback_sync_time_column: "create_time"
    target_key_columns:
      - "student_code"
      - "course_code"
    column_mappings:
      - source_column: "student_code"
        target_column: "student_code"
        required: true
      - source_column: "course_code"
        target_column: "course_code"
        required: true
      - source_column: "term_code"
        target_column: "term_code"
      - source_column: "score"
        target_column: "score"
      - source_column: "update_time"
        target_column: "update_time"
    filters:
      - column: "term_code"
        value: "2025A"
