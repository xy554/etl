# Example: source_mode=sql, write_mode=upsert
# Start with:
#   java -Dconfig=src/main/resources/examples/source-sql-upsert.example.yaml -jar etl.jar
#
# Notes:
# - SQL mode does not support filters.
# - source_sql must actually output cursor_id_column and sync_time_column.
# - Upsert mode requires target_key_column.

source:
  host: "127.0.0.1"
  port: 3306
  username: "root"
  password: "your_password"
  database: "source_db"
  charset: "utf8mb4"

target:
  host: "127.0.0.1"
  port: 3306
  username: "root"
  password: "your_password"
  database: "target_db"
  charset: "utf8mb4"

options:
  batch_size: 1000
  continue_on_error: false
  checkpoint_table: "edu_db_sync_checkpoint"
  auto_create_checkpoint_table: true

tables:
  - name: "order_sql_upsert_demo"
    source_mode: "sql"
    write_mode: "upsert"
    source_sql: |
      SELECT
        o.id,
        o.update_time,
        o.create_time,
        o.order_no AS order_id,
        o.user_id,
        o.status,
        o.amount
      FROM source_order_view o
      WHERE o.deleted_flag = 0
    target_table: "target_order"
    cursor_id_column: "id"
    sync_time_column: "update_time"
    fallback_sync_time_column: "create_time"
    target_key_column: "order_id"
    column_mappings:
      - source_column: "order_id"
        target_column: "order_id"
        required: true
      - source_column: "user_id"
        target_column: "user_id"
        required: true
      - source_column: "status"
        target_column: "status"
      - source_column: "amount"
        target_column: "amount"
      - source_column: "update_time"
        target_column: "update_time"
